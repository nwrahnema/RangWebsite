<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RANG | Cinematic Social Agency</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="landing">
    <div class="cinema-bg" aria-hidden="true"></div>

    <section class="hero" aria-label="RANG landing hero">
      <div class="hero-copy">
        <p class="kicker">RANG Creative Agency</p>
        <h1>RANG</h1>
        <p class="subcopy">
          RANG creates curated ads and runs social media
          for brands whose feeds feel outdated.
        </p>
        <div class="actions">
          <a class="btn btn-primary" href="#">View Work</a>
          <a class="btn btn-ghost" href="#">Start a Project</a>
        </div>
      </div>

      <aside class="reel" aria-label="Living portfolio reel">
        <div class="reel-stack">
          <figure class="reel-card card-1">
            <video autoplay muted loop playsinline preload="auto">
              <source src="sample.mp4" type="video/mp4">
            </video>
            <div class="reel-overlay"></div>
          </figure>
          <figure class="reel-card card-2">
            <video autoplay muted loop playsinline preload="auto">
              <source src="sample.mp4" type="video/mp4">
            </video>
            <div class="reel-overlay"></div>
          </figure>
          <figure class="reel-card card-3">
            <video autoplay muted loop playsinline preload="auto">
              <source src="sample.mp4" type="video/mp4">
            </video>
            <div class="reel-overlay"></div>
          </figure>
          <figure class="reel-card card-4">
            <video autoplay muted loop playsinline preload="auto">
              <source src="sample.mp4" type="video/mp4">
            </video>
            <div class="reel-overlay"></div>
          </figure>
        </div>
      </aside>
    </section>
  </main>
</body>
</html>
